# wrangler.toml - Cloudflare Workers & D1 Konfigurationsdatei
# ==========================================================================

name = "aura-mentor-api"
main = "index.js"
compatibility_date = "2024-05-20"

[[d1_databases]]
binding = "DB"                                   # Name des Bindungs-Objekts im Worker-Skript (env.DB)
database_name = "AURA_DB"                        # Dein Datenbankname
database_id = "DEINE_D1_DATENBANK_ID"            # Wird nach 'npx wrangler d1 create AURA_DB' generiert
